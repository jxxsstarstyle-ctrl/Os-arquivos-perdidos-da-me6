<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Os Arquivos Perdidos da Mega 6</title>
    <meta
      name="description"
      content="Um universo digital onde memórias pulsam, sombras têm consciência e cada escolha molda o destino de um mundo que respira."
    />
    <link rel="icon" href="%BASE_URL%favicon.svg" type="image/svg+xml" />
    <script>
      (function ensureHashRouting() {
        var base = '/Os-arquivos-perdidos-da-me6/';
        var path = window.location.pathname;
        var hash = window.location.hash;

        if (!hash && path.indexOf(base) === 0) {
          var subPath = path.slice(base.length);
          if (subPath) {
            var normalized = subPath.startsWith('/') ? subPath : '/' + subPath;
            window.location.replace(base + '#' + normalized + window.location.search);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
